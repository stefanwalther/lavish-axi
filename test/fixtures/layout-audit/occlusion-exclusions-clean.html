<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Intentional occlusion exclusions</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
      }
      main {
        width: min(720px, calc(100% - 32px));
        display: grid;
        gap: 20px;
      }
      .case {
        position: relative;
        min-height: 80px;
        border: 1px solid #9ba8b2;
      }
      .cover {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: #d9e4ec;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
      .mask {
        overflow: hidden;
        border-radius: 16px;
      }
      p {
        margin: 0;
        padding: 20px;
      }
      svg {
        width: 100%;
        height: 80px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="case">
        <span class="sr-only"><strong>Screen reader only recovery guidance</strong></span>
        <div class="cover" aria-hidden="true"></div>
      </section>
      <section class="case mask">
        <p>Intentionally masked carousel preview text</p>
        <div class="cover" aria-hidden="true"></div>
      </section>
      <section class="case">
        <svg aria-label="Diagram preview" viewBox="0 0 680 80">
          <text x="20" y="45" font-size="20">Diagram label handled by the diagram path</text>
        </svg>
        <div class="cover" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>

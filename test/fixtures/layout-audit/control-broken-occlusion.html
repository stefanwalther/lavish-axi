<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contained text collision</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        font-family: system-ui, sans-serif;
        color: #1b2630;
        background: #eef1f3;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(620px, 100%);
        padding: 30px;
        background: #fff;
        border: 1px solid #bac6cd;
      }
      .stack {
        display: grid;
        margin-top: 22px;
        padding: 18px;
        border: 1px solid #aebbc4;
      }
      .stack p {
        grid-area: 1/1;
        margin: 0;
        padding: 18px;
        font-size: 20px;
        line-height: 1.3;
      }
      .critical {
        color: #8f1d19;
        background: #ffd8d2;
      }
      .instructions {
        color: #173f65;
        background: #d6eaff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Recovery instructions</h1>
      <p>Both ordinary messages accidentally occupy exactly the same bounded area.</p>
      <section class="stack">
        <p class="critical">Your security key has expired. Verify your identity before continuing.</p>
        <p class="instructions">Use the trusted phone ending in 8842 to approve this recovery request.</p>
      </section>
    </main>
  </body>
</html>
